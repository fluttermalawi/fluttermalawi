<!DOCTYPE html>

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: Roboto, system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0264CA 0%, #04428E 50%, #032247 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fffffA;
        overflow: hidden;
      }
      
      .background-pattern {
        position: absolute;
        inset: 0;
        opacity: 0.1;
      }
      
      .background-pattern svg {
        width: 100%;
        height: 100%;
      }
      
      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }
      
      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        animation: float 3s ease-in-out infinite;
      }
      
      .logo svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
      }
      
      h1 {
        font-size: 6rem;
        font-weight: bold;
        margin-bottom: 1rem;
        letter-spacing: -0.05em;
        text-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      }
      
      h2 {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 1rem;
        letter-spacing: -0.025em;
      }
      
      p {
        font-size: 1.125rem;
        color: rgba(255, 255, 250, 0.9);
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      
      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 250, 0.3);
        border-top-color: #fffffA;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-top: 1rem;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      
      @media (max-width: 640px) {
        h1 {
          font-size: 4rem;
        }
        
        h2 {
          font-size: 1.5rem;
        }
        
        p {
          font-size: 1rem;
        }
        
        .logo {
          width: 60px;
          height: 60px;
        }
      }
    </style>
  </head>
